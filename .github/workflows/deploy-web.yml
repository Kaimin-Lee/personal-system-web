name: 🎨 部署前端 (LifeOS Web)

on:
  push:
    branches: [ "main", "master" ]
    # 保持这里为空，只要推送到主分支就无条件触发，防止路径不匹配导致装死

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 拉取最新代码
      uses: actions/checkout@v3

    - name: 🟢 配置 Node.js 环境
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
		cache: 'npm'                
		cache-dependency-path: './personal-system-web/package-lock.json
	
	- name: 🔍 验证 Node 版本
	    working-directory: ./personal-system-web
	    run: |
	      node --version
	      npm --version

    - name: 📦 安装依赖并打包
      working-directory: ./personal-system-web 
      run: |
        npm install
        npm run build

    - name: 📤 增量同步 Dist 到阿里云
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        # 【核心修复 3】：从正确的子文件夹里提取 dist
        source: "personal-system-web/dist/*" 
        target: "/personal-system/personal-system-web/"
        # 剥离前两级目录 (personal-system-web/dist/)，只把里面的内容扔过去
        strip_components: 2