name: 🎨 部署前端 (LifeOS Web)

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 拉取最新代码
      uses: actions/checkout@v3

    - name: 🟢 配置 Node.js 环境
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: 📦 安装依赖并打包
      run: |
        npm install
        npm run build

    - name: 📤 增量同步 Dist 到阿里云
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        source: "dist/*"
        target: "/personal-system/personal-system-web/"
        strip_components: 1