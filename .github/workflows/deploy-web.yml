name: 🎨 部署前端 (LifeOS Web)

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 拉取最新代码
      uses: actions/checkout@v4

    - name: 🟢 配置 Node.js 环境
      uses: actions/setup-node@v4
      with:
        node-version: '20' 

    - name: 🔍 验证 Node 版本
      # 【修改点 1】：删除了 working-directory，直接在当前根目录执行
      run: |
        node --version
        npm --version

    - name: 📦 安装依赖并打包
      # 【修改点 2】：同样删除 working-directory
      run: |
        npm install
        npm run build

    - name: 📤 增量同步 Dist 到阿里云
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        # 【修改点 3】：因为在根目录打包，直接抓取根目录下的 dist 文件夹
        source: "dist/*" 
        target: "/personal-system/personal-system-web/"
        # 【修改点 4】：只剥离1层外壳（即去掉 dist/ 这个目录名）
        strip_components: 1